upstream django_backend {
    server django:8000;
}

server {
    listen 80;
    server_name liftinglog.co.uk www.liftinglog.co.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name liftinglog.co.uk www.liftinglog.co.uk;

    ssl_certificate /etc/letsencrypt/live/liftinglog.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liftinglog.co.uk/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /metrics {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://django_backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
    }   
}